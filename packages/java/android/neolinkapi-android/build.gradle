buildscript {
    repositories {
        google()
        mavenCentral()
        if (project.findProperty("useMavenLocal")?.toString()?.toBoolean()) {
            mavenLocal()
        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.2'
    }
}

import java.time.Duration

plugins {
    id 'base'
    id 'maven-publish'
    id 'signing'
    id 'com.gradleup.nmcp' version '1.4.4'
}

apply plugin: 'com.android.library'

group = 'top.ceroxe.api'
version = '7.2.0'

nmcp {
    publishAllPublicationsToCentralPortal {
        username.set(providers.gradleProperty("centralUsername"))
        password.set(providers.gradleProperty("centralPassword"))
        publishingType = "AUTOMATIC"
        publicationName = "NeoLinkAPI-Android-${project.version}"
        validationTimeout = Duration.ofMinutes(30)
    }
}

android {
    namespace 'top.ceroxe.api.android.neolink'
    compileSdk 36

    defaultConfig {
        minSdk 33
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildFeatures {
        buildConfig false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            java.srcDirs = [
                    'src/main/java',
                    '../../common/src/main/java',
                    '../../shared/src/main/java'
            ]
            resources.srcDirs = [
                    'src/main/resources',
                    '../../shared/src/main/resources'
            ]
            manifest.srcFile 'src/main/AndroidManifest.xml'
        }
        test {
            java.srcDir 'src/test/java'
        }
        androidTest {
            java.srcDir 'src/androidTest/java'
        }
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }

    lint {
        abortOnError true
    }
}

dependencies {
    api 'top.ceroxe.api:ceroxe-core-android:2.0.0'
    api 'com.google.code.gson:gson:2.11.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
    androidTestImplementation 'androidx.test:runner:1.7.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
    options.addStringOption('Xdoclint:none', '-quiet')
    failOnError = false
}

def extractAarClasses = tasks.register('extractAarClasses') {
    def outputDir = layout.buildDirectory.dir('tmp/aar-classes').get().asFile
    outputs.dir(outputDir)
    doLast {
        configurations.releaseCompileClasspath.files.findAll { it.name.endsWith('.aar') }.each { aar ->
            copy {
                from zipTree(aar).matching { include 'classes.jar' }
                into outputDir
                rename { "${aar.name.replace('.aar', '')}-classes.jar" }
            }
        }
    }
}

def releaseJavadoc = tasks.register('releaseJavadoc', Javadoc) {
    dependsOn extractAarClasses
    source = android.sourceSets.main.java.srcDirs
    classpath = files(android.getBootClasspath())
    classpath += fileTree(layout.buildDirectory.dir('tmp/aar-classes'))
    classpath += files(configurations.releaseCompileClasspath.files.findAll { !it.name.endsWith('.aar') })
    destinationDir = layout.buildDirectory.dir('docs/javadoc').get().asFile
    options.encoding = 'UTF-8'
    options.addStringOption('Xdoclint:none', '-quiet')
    failOnError = false
}

def releaseJavadocJar = tasks.register('releaseJavadocJar', Jar) {
    dependsOn releaseJavadoc
    archiveClassifier = 'javadoc'
    from releaseJavadoc.map { it.destinationDir }
}

publishing {
    publications {
        release(MavenPublication) {
            afterEvaluate {
                from components.release
            }

            groupId = project.group
            artifactId = 'neolinkapi-android'
            version = project.version
            artifact releaseJavadocJar

            pom {
                name = 'NeoLinkAPI Android'
                description = 'Android-compatible NeoLink TCP/UDP tunnel client.'
                url = 'https://github.com/CeroxeAnivie/NeoLinkAPI'

                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                        distribution = 'repo'
                    }
                }

                developers {
                    developer {
                        id = 'CeroxeAnivie'
                        name = 'Ceroxe'
                        email = '1591117599@qq.com'
                        organization = 'Ceroxe'
                        url = 'https://github.com/CeroxeAnivie'
                    }
                }

                scm {
                    connection = 'scm:git:git://github.com/CeroxeAnivie/NeoLinkAPI.git'
                    developerConnection = 'scm:git:ssh://github.com:CeroxeAnivie/NeoLinkAPI.git'
                    url = 'https://github.com/CeroxeAnivie/NeoLinkAPI'
                }
            }
        }
    }

    repositories {
        maven {
            name = 'centralStaging'
            url = layout.buildDirectory.dir('repos/central-staging').get().asFile.toURI()
        }
    }
}

signing {
    useGpgCmd()
    sign publishing.publications.release
}
